<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ostuni Smart Transit Ultimate</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --l1-color: #0A58CA; --l2-color: #DC3545;
            --surface: rgba(255, 255, 255, 0.95); --bg: #f8f9fa;
            --text-main: #1A1D20; --text-sub: #6C757D;
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bot: env(safe-area-inset-bottom, 20px);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; padding: 0; height: 100dvh; overflow: hidden; background: var(--bg); color: var(--text-main); }

        #map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 1; }

        header {
            position: absolute; top: 0; left: 0; right: 0;
            padding: calc(var(--safe-top) + 10px) 20px 15px;
            background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.6) 100%);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
        }
        .app-title { font-weight: 800; font-size: 20px; letter-spacing: -0.5px; }
        .app-title span { color: var(--l1-color); }

        .fab-gps {
            position: absolute; right: 15px; bottom: calc(410px + var(--safe-bot));
            width: 48px; height: 48px; border-radius: 50%; background: white; border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); font-size: 20px; z-index: 1000; cursor: pointer;
        }

        /* BOTTOM SHEET PRINCIPALE */
        .bottom-sheet {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: var(--surface); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top-left-radius: 28px; border-top-right-radius: 28px;
            padding: 20px 15px calc(20px + var(--safe-bot)); z-index: 2000; box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; gap: 12px;
        }

        /* CONTROLLI LINEA E DIREZIONE */
        .segmented-control { display: flex; background: rgba(0,0,0,0.05); border-radius: 12px; padding: 4px; }
        .seg-btn { flex: 1; padding: 8px; border: none; border-radius: 8px; background: transparent; font-size: 12px; font-weight: 700; color: var(--text-sub); transition: 0.2s; cursor: pointer; }
        .seg-btn.active-l1 { background: white; color: var(--l1-color); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .seg-btn.active-l2 { background: white; color: var(--l2-color); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .seg-btn.active-dir { background: white; color: var(--text-main); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* SELETTORE FERMATE (Novità) */
        .stop-selector {
            display: flex; gap: 8px; overflow-x: auto; padding: 5px 0 10px 0;
            scrollbar-width: none; -webkit-overflow-scrolling: touch;
        }
        .stop-selector::-webkit-scrollbar { display: none; }
        .stop-chip {
            background: white; border: 2px solid #dee2e6; padding: 8px 16px; border-radius: 20px;
            font-size: 13px; font-weight: 700; color: var(--text-sub); white-space: nowrap; cursor: pointer; transition: 0.2s;
        }
        .stop-chip.active { border-color: var(--l1-color); background: #eef4ff; color: var(--l1-color); }
        .stop-chip.active-l2 { border-color: var(--l2-color); background: #fff0f1; color: var(--l2-color); }

        /* DASHBOARD INFO */
        .dashboard { display: flex; align-items: center; gap: 15px; background: white; padding: 15px; border-radius: 16px; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .timer-box { background: var(--text-main); color: white; min-width: 80px; height: 80px; border-radius: 18px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .timer-box .val { font-size: 32px; font-weight: 800; line-height: 1; }
        .timer-box .lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; opacity: 0.8; }
        .status-info { flex: 1; }
        .status-title { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--text-sub); margin-bottom: 2px; }
        .status-text { font-size: 18px; font-weight: 800; color: var(--text-main); margin-bottom: 2px; }
        .status-stop { font-size: 12px; font-weight: 600; color: var(--l1-color); margin-bottom: 4px; display: flex; align-items: center; gap:4px; }

        /* TIMELINE ORARI */
        .schedule-scroller { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .schedule-scroller::-webkit-scrollbar { display: none; }
        .time-chip { background: white; border: 1px solid #dee2e6; padding: 8px 14px; border-radius: 10px; font-size: 13px; font-weight: 700; color: var(--text-main); white-space: nowrap; }
        .time-chip.past { opacity: 0.4; text-decoration: line-through; background: transparent; border-color: transparent; }
        .time-chip.next { background: var(--text-main); color: white; border-color: var(--text-main); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        .btn-buy { display: block; width: 100%; padding: 15px; border-radius: 14px; background: var(--l1-color); color: white; text-align: center; text-decoration: none; font-weight: 800; font-size: 14px; margin-top: 5px; }

        /* MARKER MAPPA MIGLIORATI */
        .stop-marker { background: white; border: 3px solid #666; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.3); transition: 0.3s; }
        .stop-marker-active { border: 4px solid var(--l1-color); transform: scale(1.4); z-index: 800 !important; background: white; border-radius: 50%; box-shadow: 0 0 0 5px rgba(10, 88, 202, 0.2); }
        .stop-marker-active-l2 { border: 4px solid var(--l2-color); transform: scale(1.4); z-index: 800 !important; background: white; border-radius: 50%; box-shadow: 0 0 0 5px rgba(220, 53, 69, 0.2); }
        
        .bus-live-marker { background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 2px solid var(--text-main); transition: transform 0.3s; z-index: 1000 !important; }
        
        /* Animazione Linee */
        .flow-line { animation: flow-dash 30s linear infinite; }
        .flow-line-reverse { animation: flow-dash-reverse 30s linear infinite; }
        @keyframes flow-dash { to { stroke-dashoffset: -1000; } }
        @keyframes flow-dash-reverse { to { stroke-dashoffset: 1000; } }
    </style>
</head>
<body>

<header>
    <div class="app-title">Ostuni<span>Transit</span></div>
</header>

<div id="map"></div>
<button class="fab-gps" onclick="locateUser()">🎯</button>

<div class="bottom-sheet" id="ui-panel">
    
    <div class="segmented-control">
        <button id="tab-l1" class="seg-btn active-l1" onclick="appState.setLine('L1')">Linea 1 (Mare)</button>
        <button id="tab-l2" class="seg-btn" onclick="appState.setLine('L2')">Linea Specchia</button>
    </div>
    
    <div class="segmented-control" style="background: rgba(0,0,0,0.03);">
        <button id="dir-out" class="seg-btn active-dir" onclick="appState.setDir('out')">Verso Stazione/Mare</button>
        <button id="dir-in" class="seg-btn" onclick="appState.setDir('in')">Verso Centro</button>
    </div>

    <!-- SELETTORE FERMATE -->
    <div class="stop-selector" id="stop-list">
        <!-- Generato dinamicamente via JS -->
    </div>

    <div class="dashboard">
        <div class="timer-box" id="timer-box">
            <span class="val" id="time-val">--</span>
            <span class="lbl">MIN</span>
        </div>
        <div class="status-info">
            <div class="status-title">Orario Calcolato per:</div>
            <div class="status-stop" id="lbl-stop">📍 Seleziona fermata</div>
            <div class="status-text" id="next-time">--:--</div>
        </div>
    </div>

    <div class="schedule-scroller" id="full-schedule"></div>

    <a href="https://www.mooneygo.it/" class="btn-buy" id="btn-pay">🎟️ Acquista Ticket su MooneyGo</a>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // --- DATABASE: Orari Base (Capolinea) + FERMATE CON OFFSET (Minuti dal capolinea) ---
    const SCHEDULE_DB = {
        L1: {
            color: '#0A58CA',
            route: [[40.7307, 17.5778], [40.7325, 17.5786],[40.7350, 17.5790],[40.7375, 17.5802],[40.7405, 17.5840],[40.7440, 17.5865],[40.7485, 17.5895],[40.7516, 17.5913],[40.7550, 17.5920],[40.7620, 17.5935],[40.7710, 17.5950],[40.7815, 17.5962], [40.7870, 17.5960],[40.7905, 17.5966]],
            travelTime: 20,
            out: {
                label: "Verso Stazione / Mare",
                departures:["07:15", "08:05", "09:10", "10:10", "11:10", "12:10", "13:10", "14:10", "15:30", "16:40", "18:00", "19:10", "20:10"],
                stops:[
                    { name: "Piazza Libertà", coords:[40.7307, 17.5778], offsetMin: 0 },
                    { name: "Viale Pola", coords:[40.7375, 17.5802], offsetMin: 3 },
                    { name: "Stazione FS", coords:[40.7516, 17.5913], offsetMin: 8 },
                    { name: "Villanova Mare", coords:[40.7905, 17.5966], offsetMin: 20 }
                ]
            },
            in: {
                label: "Verso Centro Storico",
                departures:["07:45", "08:35", "09:40", "10:40", "11:40", "12:40", "13:40", "14:40", "16:00", "17:10", "18:30", "19:40", "20:40"],
                stops: [
                    { name: "Villanova Mare", coords:[40.7905, 17.5966], offsetMin: 0 },
                    { name: "Stazione FS", coords: [40.7516, 17.5913], offsetMin: 12 },
                    { name: "Viale Pola", coords:[40.7375, 17.5802], offsetMin: 17 },
                    { name: "Piazza Libertà", coords: [40.7307, 17.5778], offsetMin: 20 }
                ]
            }
        },
        L2: {
            color: '#DC3545',
            route: [[40.7350, 17.5710],[40.7365, 17.5735],[40.7380, 17.5760],[40.7405, 17.5800],[40.7440, 17.5845],[40.7485, 17.5895],[40.7516, 17.5913]],
            travelTime: 15,
            out: {
                label: "Verso Stazione FS",
                departures:["06:55", "07:25", "08:15", "09:15", "10:15", "11:15", "12:15", "13:20", "14:20", "16:20", "17:30", "18:50", "19:50"],
                stops:[
                    { name: "Via T. Specchia", coords:[40.7350, 17.5710], offsetMin: 0 },
                    { name: "Via Giovanni XXIII", coords:[40.7380, 17.5760], offsetMin: 4 },
                    { name: "Stazione FS", coords:[40.7516, 17.5913], offsetMin: 15 }
                ]
            },
            in: {
                label: "Verso Via Specchia",
                departures:["07:10", "07:55", "08:50", "09:50", "10:50", "11:50", "12:50", "13:55", "15:00", "16:45", "18:10", "19:15", "20:15"],
                stops:[
                    { name: "Stazione FS", coords: [40.7516, 17.5913], offsetMin: 0 },
                    { name: "Via Giovanni XXIII", coords:[40.7380, 17.5760], offsetMin: 11 },
                    { name: "Via T. Specchia", coords: [40.7350, 17.5710], offsetMin: 15 }
                ]
            }
        }
    };

    const appState = {
        line: 'L1', dir: 'out', stopIdx: 0, map: null, 
        layers: { routes:[], stops:[], bus: null },

        setLine(l) { this.line = l; this.stopIdx = 0; this.updateUI(); this.drawMap(); },
        setDir(d) { this.dir = d; this.stopIdx = 0; this.updateUI(); this.drawMap(); },
        setStop(idx) { this.stopIdx = idx; this.renderStopSelector(); this.highlightMapStop(); this.processData(); },

        // Utility: Aggiunge minuti a un orario "HH:MM"
        addMinutesToTime(timeStr, mins) {
            let [h, m] = timeStr.split(':').map(Number);
            let totalMins = h * 60 + m + mins;
            let newH = Math.floor(totalMins / 60) % 24;
            let newM = totalMins % 60;
            return `${String(newH).padStart(2, '0')}:${String(newM).padStart(2, '0')}`;
        },

        updateUI() {
            const c = SCHEDULE_DB[this.line].color;
            document.getElementById('tab-l1').className = `seg-btn ${this.line === 'L1' ? 'active-l1' : ''}`;
            document.getElementById('tab-l2').className = `seg-btn ${this.line === 'L2' ? 'active-l2' : ''}`;
            document.getElementById('dir-out').className = `seg-btn ${this.dir === 'out' ? 'active-dir' : ''}`;
            document.getElementById('dir-in').className = `seg-btn ${this.dir === 'in' ? 'active-dir' : ''}`;
            
            document.getElementById('dir-out').innerText = SCHEDULE_DB[this.line].out.label;
            document.getElementById('dir-in').innerText = SCHEDULE_DB[this.line].in.label;
            
            document.querySelector('.app-title span').style.color = c;
            document.getElementById('btn-pay').style.background = c;
            document.getElementById('timer-box').style.background = c;
            
            this.renderStopSelector();
            this.processData();
        },

        renderStopSelector() {
            const container = document.getElementById('stop-list');
            container.innerHTML = '';
            const stops = SCHEDULE_DB[this.line][this.dir].stops;
            const activeClass = this.line === 'L1' ? 'active' : 'active-l2';

            stops.forEach((stop, idx) => {
                let btn = document.createElement('div');
                btn.className = `stop-chip ${idx === this.stopIdx ? activeClass : ''}`;
                btn.innerText = stop.name;
                btn.onclick = () => this.setStop(idx);
                container.appendChild(btn);
            });

            document.getElementById('lbl-stop').innerHTML = `📍 ${stops[this.stopIdx].name}`;
            document.getElementById('lbl-stop').style.color = SCHEDULE_DB[this.line].color;
            
            // Auto scroll per centrare il bottone
            setTimeout(() => {
                const activeEl = container.querySelector('.stop-chip[class*="active"]');
                if(activeEl) container.scrollTo({ left: activeEl.offsetLeft - 20, behavior: 'smooth' });
            }, 100);
        },

        processData() {
            const now = new Date();
            const currentMins = now.getHours() * 60 + now.getMinutes();
            
            const currentDirData = SCHEDULE_DB[this.line][this.dir];
            const baseDepartures = currentDirData.departures;
            const stopOffset = currentDirData.stops[this.stopIdx].offsetMin;
            
            // CALCOLO ORARI LOCALI PER LA FERMATA SELEZIONATA
            const localSchedule = baseDepartures.map(time => this.addMinutesToTime(time, stopOffset));
            
            let nextIndex = -1;
            let activeBusIndex = -1;

            // Logica orari (basata sull'orario locale della fermata)
            for(let i=0; i<localSchedule.length; i++) {
                let [h, m] = localSchedule[i].split(':');
                let localTimeInMins = parseInt(h)*60 + parseInt(m);
                
                if (localTimeInMins >= currentMins) {
                    if (nextIndex === -1) nextIndex = i;
                }
            }

            // Logica Posizione Fisica (basata SEMPRE sulla partenza dal capolinea)
            for(let i=0; i<baseDepartures.length; i++) {
                let[h, m] = baseDepartures[i].split(':');
                let baseTimeInMins = parseInt(h)*60 + parseInt(m);
                if (currentMins >= baseTimeInMins && currentMins < (baseTimeInMins + SCHEDULE_DB[this.line].travelTime)) {
                    activeBusIndex = i; // Bus fisicamente per strada
                }
            }

            this.renderTimeline(localSchedule, nextIndex);
            
            if (nextIndex !== -1) {
                let[h, m] = localSchedule[nextIndex].split(':');
                document.getElementById('time-val').innerText = (parseInt(h)*60 + parseInt(m)) - currentMins;
                document.getElementById('next-time').innerText = localSchedule[nextIndex];
            } else {
                document.getElementById('time-val').innerText = "--";
                document.getElementById('next-time').innerText = "Servizio Terminato";
            }

            this.moveBusOnMap(baseDepartures, currentMins, activeBusIndex, nextIndex);
        },

        renderTimeline(localSchedule, nextIndex) {
            const container = document.getElementById('full-schedule');
            container.innerHTML = '';
            localSchedule.forEach((time, index) => {
                let div = document.createElement('div');
                div.innerText = time;
                if (index < nextIndex && nextIndex !== -1) div.className = 'time-chip past';
                else if (index === nextIndex) { div.className = `time-chip next`; div.id = 'chip-next'; }
                else div.className = 'time-chip';
                container.appendChild(div);
            });
            setTimeout(() => {
                const n = document.getElementById('chip-next');
                if(n) container.scrollTo({ left: n.offsetLeft - 20, behavior: 'smooth' });
            }, 300);
        },

        moveBusOnMap(baseDepartures, currentMins, activeBusIndex, nextIndex) {
            let progress = 0; 
            if (activeBusIndex !== -1) {
                let [h, m] = baseDepartures[activeBusIndex].split(':');
                progress = (currentMins - (parseInt(h)*60 + parseInt(m))) / SCHEDULE_DB[this.line].travelTime;
            } else if (nextIndex !== -1) {
                progress = 0; 
            } else {
                if(this.layers.bus) this.map.removeLayer(this.layers.bus);
                return;
            }

            const rawRoute = SCHEDULE_DB[this.line].route;
            const path = this.dir === 'out' ? rawRoute :[...rawRoute].reverse();
            if (progress < 0) progress = 0; if (progress > 1) progress = 1;

            let totalDist = 0; let dists = [0];
            for(let i=0; i<path.length-1; i++) {
                totalDist += this.map.distance(path[i], path[i+1]);
                dists.push(totalDist);
            }

            let targetDist = totalDist * progress;
            let currentCoords = path[path.length-1]; 

            for(let i=0; i<path.length-1; i++) {
                if(targetDist >= dists[i] && targetDist <= dists[i+1]) {
                    let segmentProgress = (targetDist - dists[i]) / (dists[i+1] - dists[i]);
                    let lat = path[i][0] + (path[i+1][0] - path[i][0]) * segmentProgress;
                    let lng = path[i][1] + (path[i+1][1] - path[i][1]) * segmentProgress;
                    currentCoords =[lat, lng]; break;
                }
            }

            if (!this.layers.bus) {
                let icon = L.divIcon({ className: 'bus-live-marker', html: '🚌', iconSize:[32,32], iconAnchor:[16,16] });
                this.layers.bus = L.marker(currentCoords, {icon: icon, zIndexOffset: 1000}).addTo(this.map);
            } else {
                this.layers.bus.setLatLng(currentCoords);
                this.layers.bus.getElement().style.borderColor = SCHEDULE_DB[this.line].color;
            }
        },

        initMap() {
            this.map = L.map('map', { zoomControl: false }).setView([40.7400, 17.5800], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(this.map);
            this.drawMap();
        },

        drawMap() {
            this.layers.routes.forEach(l => this.map.removeLayer(l));
            this.layers.stops.forEach(s => this.map.removeLayer(s));
            this.layers.routes = []; this.layers.stops =[];

            const c = SCHEDULE_DB[this.line].color;
            const rawRoute = SCHEDULE_DB[this.line].route;
            const route = this.dir === 'out' ? rawRoute : [...rawRoute].reverse();
            const stops = SCHEDULE_DB[this.line][this.dir].stops;

            let shadow = L.polyline(route, { color: c, weight: 10, opacity: 0.15, lineCap: 'round', lineJoin: 'round' }).addTo(this.map);
            let base = L.polyline(route, { color: c, weight: 5, opacity: 1, lineCap: 'round', lineJoin: 'round' }).addTo(this.map);
            let flowClass = this.dir === 'out' ? 'flow-line' : 'flow-line-reverse';
            let flow = L.polyline(route, { color: 'white', weight: 2, dashArray: '10, 15', className: flowClass, lineCap: 'round' }).addTo(this.map);

            this.layers.routes.push(shadow, base, flow);

            // Disegna fermate reali
            stops.forEach((stop, idx) => {
                let icon = L.divIcon({ className: 'stop-marker', iconSize:[12, 12], iconAnchor:[6,6] });
                let m = L.marker(stop.coords, { icon: icon }).addTo(this.map);
                
                // Cliccare sulla mappa cambia la fermata selezionata!
                m.on('click', () => { this.setStop(idx); });
                this.layers.stops.push(m);
            });

            this.highlightMapStop();

            const uiHeight = document.getElementById('ui-panel').offsetHeight;
            this.map.fitBounds(base.getBounds(), { paddingBottomRight:[20, uiHeight + 30], animate: true });
        },

        highlightMapStop() {
            const activeClass = this.line === 'L1' ? 'stop-marker-active' : 'stop-marker-active-l2';
            this.layers.stops.forEach((m, idx) => {
                let el = m.getElement();
                if(el) {
                    if(idx === this.stopIdx) el.className = `leaflet-marker-icon leaflet-zoom-animated leaflet-interactive ${activeClass}`;
                    else el.className = `leaflet-marker-icon leaflet-zoom-animated leaflet-interactive stop-marker`;
                }
            });
            // Focus mappa sulla fermata scelta
            if(this.layers.stops[this.stopIdx]) {
                const uiHeight = document.getElementById('ui-panel').offsetHeight;
                this.map.panTo(this.layers.stops[this.stopIdx].getLatLng(), {animate: true});
            }
        }
    };

    function locateUser() { if (appState.map) appState.map.locate({ setView: true, maxZoom: 16 }); }

    window.onload = () => {
        appState.initMap();
        appState.updateUI();
        setInterval(() => appState.processData(), 15000); // Ricalcola ogni 15 sec
    };
</script>
</body>
</html>
